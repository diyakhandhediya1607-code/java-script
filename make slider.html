<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Marvel Slider</title>

  <
  <script src="https://cdn.tailwindcss.com"></script>


  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
  />
</head>

<body class="m-0 overflow-hidden bg-black">

 
  <nav class="w-full bg-black text-white px-6  pb-4 border-b border-red-600">

    <div class="flex items-center justify-between">

    
      <div class="flex items-center gap-3">

        <div class="bg-red-600 px-4 py-2 rounded-md shadow-lg">
          <h1 class="text-white text-2xl font-extrabold tracking-widest">
            MARVEL
          </h1>
        </div>

      </div>

    
      <ul class="flex items-center gap-6 text-lg font-semibold">

        <li>
          <a href="#" class="hover:text-red-500 duration-300">
            Home
          </a>
        </li>

        <li>
          <a href="#" class="hover:text-red-500 duration-300">
            Heroes
          </a>
        </li>

        <li>
          <a href="#" class="hover:text-red-500 duration-300">
            Movies
          </a>
        </li>

        <li>
          <a href="#" class="hover:text-red-500 duration-300">
            Contact
          </a>
        </li>

      </ul>

    </div>

  </nav>

  
  <section class="relative w-full overflow-hidden">

   
    <div class="swiper mySwiper w-full h-[calc(100vh-72px)]">

      <div class="swiper-wrapper">

        
        <div class="swiper-slide">
          <img
            src="src/81VrkMTAvAL._SL1500_.jpg"
            class="w-full h-[calc(100vh-72px)] object-cover"
            alt=""
          />
        </div>

       
        <div class="swiper-slide">
          <img
            src="src/1812115.jpg"
            class="w-full h-[calc(100vh-72px)] object-cover"
            alt=""
          />
        </div>

       
        <div class="swiper-slide">
          <img
            src="src/marvel-comics-miles-morales-glowing-eyes-desktop-wallpaper-cover.jpg"
            class="w-full h-[calc(100vh-72px)] object-cover"
            alt=""
          />
        </div>

        
        <div class="swiper-slide">
          <img
            src="src/wp15584502.jpg"
            class="w-full h-[calc(100vh-72px)] object-cover"
            alt=""
          />
        </div>

      </div>

      
      <div class="swiper-button-prev text-white"></div>
      <div class="swiper-button-next text-white"></div>

    </div>

  </section>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

  
  <script>
    const swiper = new Swiper(".mySwiper", {

      loop: true,

      autoplay: {
        delay: 3000,
        disableOnInteraction: false,
      },

      navigation: {
        nextEl: ".swiper-button-next",
        prevEl: ".swiper-button-prev",
      },

    });
  </script>

</body>

</html>
